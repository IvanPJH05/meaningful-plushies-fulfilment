services:
  postgres:
    image: postgres:16-alpine
    container_name: meaningful-plushies-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meaningful
      POSTGRES_PASSWORD: meaningful_dev_password
      POSTGRES_DB: meaningful_plushies_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meaningful -d meaningful_plushies_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meaningful-plushies-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: meaningful-plushies-crm-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: meaningful
      MINIO_ROOT_PASSWORD: meaningful_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
