# Triggered once by Codex to apply the accounting workspace UI update.
name: Apply accounting workspace update

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-accounting-workspace.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply workspace switcher and accounting sidebar
        run: |
          python - <<'PY'
          print('This workflow was superseded by the full updater file from the previous commit.')
          PY
      - name: Commit update
        run: |
          echo "No-op trigger. The previous updater workflow remains in commit history."
